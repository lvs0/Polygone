# ═══════════════════════════════════════════════════════════════════════════════
# ⬡ POLYGONE — GitHub Actions CI/CD Multiplateforme
# ═══════════════════════════════════════════════════════════════════════════════
# Build, test, and release binaries for Linux, macOS, and Windows
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Build & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'

jobs:
  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --all-features
      
      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Build Linux ───────────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Build Linux (x86_64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release --bin polygone
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polygone-linux-x86_64
          path: target/release/polygone

  # ── Build macOS ───────────────────────────────────────────────────────────────
  build-macos:
    name: 🍎 Build macOS (x86_64 + arm64)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install OpenSSL
        run: brew install openssl
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release (universal)
        run: |
          # Build for x86_64
          cargo build --release --bin polygone --target x86_64-apple-darwin
          # Build for arm64
          cargo build --release --bin polygone --target aarch64-apple-darwin
      
      - name: Upload artifact (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: polygone-macos-x86_64
          path: target/x86_64-apple-darwin/release/polygone
      
      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: polygone-macos-arm64
          path: target/aarch64-apple-darwin/release/polygone

  # ── Build Windows ─────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows (x86_64)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release --bin polygone
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polygone-windows-x86_64.exe
          path: target/release/polygone.exe

  # ── Create Release ────────────────────────────────────────────────────────────
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          cd artifacts
          chmod +x polygone-linux-x86_64/polygone
          chmod +x polygone-macos-x86_64/polygone
          chmod +x polygone-macos-arm64/polygone
          
          # Create archives
          tar -czvf polygone-linux-x86_64.tar.gz -C polygone-linux-x86_64 polygone
          tar -czvf polygone-macos-x86_64.tar.gz -C polygone-macos-x86_64 polygone
          tar -czvf polygone-macos-arm64.tar.gz -C polygone-macos-arm64 polygone
          zip polygone-windows-x86_64.zip polygone-windows-x86_64.exe/polygone.exe
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/polygone-linux-x86_64.tar.gz
            artifacts/polygone-macos-x86_64.tar.gz
            artifacts/polygone-macos-arm64.tar.gz
            artifacts/polygone-windows-x86_64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
