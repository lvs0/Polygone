services:
  - type: web
    name: polygone-node
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_PSEUDO
        value: polygone-render
      - key: PUBLIC_URL
        fromInstance: true
      - key: BOOTSTRAP_PEERS
        value: ""  # laissez vide pour un premier nœud, ou listez des pairs
# Notes : Render sleep après 15 min d'inactivité. Le keepalive.sh maintient le service éveillé.
