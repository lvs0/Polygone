app = "polygone-node"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_PSEUDO = "polygone-fly"
  PUBLIC_URL = "https://polygone-node.fly.dev"
  BOOTSTRAP_PEERS = ""
