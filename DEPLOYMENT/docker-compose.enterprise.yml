version: '3.8'

services:
  # Polygone Core Network
  polygone-core:
    image: polygone/core:v2.0.0
    container_name: polygone-core
    restart: unless-stopped
    ports:
      - "4001:4001/udp"
      - "4002:4002/udp"
      - "4003:4003/udp"
    environment:
      - NODE_ID=${POLYGONE_NODE_ID:-core-001}
      - BOOTSTRAP_NODES=${POLYGONE_BOOTSTRAP:-}
      - LOG_LEVEL=info
    volumes:
      - polygone-data:/data
      - ./config:/config
    networks:
      - polygone-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Polygone Petals - Distributed LLM
  polygone-petals:
    image: polygone/petals:v2.0.0
    container_name: polygone-petals
    restart: unless-stopped
    ports:
      - "4003:4003/tcp"
      - "4004:4004/tcp"
    environment:
      - LAYERS=${PETALS_LAYERS:-0-15}
      - MODEL_PATH=/models/llama-7b
      - MAX_CONCURRENT_REQUESTS=10
      - ENABLE_TRAINING=true
    volumes:
      - ./models:/models:ro
      - polygone-data:/data
      - ./checkpoints:/checkpoints
    networks:
      - polygone-net
    depends_on:
      - polygone-core
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
          nvidia.com/gpu: 1
        reservations:
          cpus: '2.0'
          memory: 4G
          nvidia.com/gpu: 1

  # Polygone Hide - Privacy Tunnel
  polygone-hide:
    image: polygone/hide:v2.0.0
    container_name: polygone-hide
    restart: unless-stopped
    ports:
      - "1080:1080/tcp"
    environment:
      - LISTEN_PORT=1080
      - MAX_CONNECTIONS=1000
      - ENABLE_ENTERPRISE=true
      - POLICY_FILE=/config/enterprise-policy.json
    volumes:
      - ./config:/config:ro
      - ./logs:/logs
      - ./certs:/certs:ro
    networks:
      - polygone-net
    depends_on:
      - polygone-core
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # MAX AI Assistant
  max-assistant:
    image: polygone/max:v2.0.0
    container_name: max-assistant
    restart: unless-stopped
    ports:
      - "8000:8000/tcp"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ENABLE_VOICE=true
      - ENABLE_MOBILE=true
      - DB_PATH=/data/max.db
      - CONFIG_FILE=/config/max-config.json
    volumes:
      - ./config:/config:ro
      - max-data:/data
      - ./logs:/logs
    networks:
      - polygone-net
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # Ollama AI Runtime
  ollama:
    image: ollama/ollama:v0.5.0
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434/tcp"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_MAX_LOADED_MODELS=5
      - OLLAMA_MAX_QUEUE=512
    volumes:
      - ollama-data:/root/.ollama
      - ./models:/models:ro
    networks:
      - polygone-net
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
          nvidia.com/gpu: 1
        reservations:
          cpus: '2.0'
          memory: 4G
          nvidia.com/gpu: 1

  # NEXUS OS Web Interface
  nexus-web:
    image: polygone/nexus:v2.0.0
    container_name: nexus-web
    restart: unless-stopped
    ports:
      - "3000:3000/tcp"
    environment:
      - NEXUS_MODE=web
      - AURA_ENABLED=true
      - THEME=dark
      - ENABLE_MULTI_TENANT=true
    volumes:
      - nexus-data:/data
      - ./config:/config:ro
      - ./users:/users
    networks:
      - polygone-net
    depends_on:
      - polygone-core
      - max-assistant
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Enterprise Monitoring
  polygone-monitor:
    image: polygone/monitor:v2.0.0
    container_name: polygone-monitor
    restart: unless-stopped
    ports:
      - "9090:9090/tcp"
    environment:
      - PROMETHEUS_ENABLED=true
      - GRAFANA_ENABLED=true
      - ALERT_WEBHOOK=${ALERT_WEBHOOK:-}
      - METRICS_RETENTION=30d
    volumes:
      - ./monitoring:/monitoring
      - ./logs:/logs:ro
    networks:
      - polygone-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Enterprise Database
  polygone-db:
    image: postgres:16-alpine
    container_name: polygone-db
    restart: unless-stopped
    ports:
      - "5432:5432/tcp"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-polygone}
      - POSTGRES_USER=${POSTGRES_USER:-polygone}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-$(openssl rand -base64 32)}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - polygone-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # Redis Cache
  polygone-redis:
    image: redis:7-alpine
    container_name: polygone-redis
    restart: unless-stopped
    ports:
      - "6379:6379/tcp"
    command: redis-server --appendonly yes --maxmemory 1gb
    volumes:
      - redis-data:/data
    networks:
      - polygone-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # Load Balancer
  polygone-lb:
    image: nginx:alpine
    container_name: polygone-lb
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - polygone-net
    depends_on:
      - nexus-web
      - max-assistant
      - polygone-monitor
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  polygone-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  max-data:
    driver: local
  nexus-data:
    driver: local
  ollama-data:
    driver: local
  monitoring:
    driver: local

networks:
  polygone-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
