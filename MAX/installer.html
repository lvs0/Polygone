<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAX — One-Click Installer</title>
  <style>
    :root {
      --bg: #050510;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.1);
      --orb-blue: #00F5F5;
      --orb-yellow: #FFD700;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --success: #00E676;
      --error: #FF3D5A;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .installer-container {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .installer-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .installer-logo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--orb-blue), var(--orb-yellow), var(--orb-blue));
      margin: 0 auto 20px;
      animation: orbRotate 6s linear infinite;
    }

    .installer-title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--orb-blue), var(--orb-yellow));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .installer-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .requirements {
      background: rgba(0,245,245,0.1);
      border: 1px solid rgba(0,245,245,0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .requirements h3 {
      color: var(--orb-blue);
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    .requirement-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .requirement-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }

    .requirement-icon.check {
      background: var(--success);
      color: white;
    }

    .requirement-icon.warning {
      background: var(--orb-yellow);
      color: var(--bg);
    }

    .requirement-icon.error {
      background: var(--error);
      color: white;
    }

    .install-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .install-btn {
      background: linear-gradient(135deg, var(--orb-blue), var(--orb-yellow));
      border: none;
      border-radius: 12px;
      padding: 16px 24px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .install-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,245,245,0.3);
    }

    .install-btn.secondary {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text);
    }

    .install-btn.secondary:hover {
      background: var(--glass);
      border-color: var(--orb-blue);
    }

    .progress-container {
      margin-top: 20px;
      display: none;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orb-blue), var(--orb-yellow));
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
    }

    .status-message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .status-message.success {
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--success);
    }

    .status-message.error {
      background: rgba(255,61,90,0.1);
      border: 1px solid rgba(255,61,90,0.3);
      color: var(--error);
    }

    @keyframes orbRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .installer-container {
        padding: 30px 20px;
        margin: 10px;
      }
      
      .installer-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="installer-container">
    <div class="installer-header">
      <div class="installer-logo"></div>
      <h1 class="installer-title">MAX</h1>
      <p class="installer-subtitle">Local AI Assistant - One-Click Installation</p>
    </div>

    <div class="requirements">
      <h3>System Requirements</h3>
      <div class="requirement-item">
        <div class="requirement-icon check" id="osCheck">✓</div>
        <span>Operating System: Windows/macOS/Linux</span>
      </div>
      <div class="requirement-item">
        <div class="requirement-icon" id="pythonCheck">⏳</div>
        <span>Python 3.8+ installed</span>
      </div>
      <div class="requirement-item">
        <div class="requirement-icon" id="ollamaCheck">⏳</div>
        <span>Ollama installed and running</span>
      </div>
      <div class="requirement-item">
        <div class="requirement-icon" id="memoryCheck">⏳</div>
        <span>4GB+ RAM available</span>
      </div>
    </div>

    <div class="install-buttons">
      <button class="install-btn" onclick="installMax()">
        🚀 Install MAX
      </button>
      <a href="mobile.html" class="install-btn secondary">
        📱 Try Mobile Version
      </a>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="status-message" id="statusMessage"></div>
  </div>

  <script>
    let installationStep = 0;
    const totalSteps = 5;

    // Check system requirements
    async function checkRequirements() {
      // Check Python
      try {
        const pythonVersion = await checkPython();
        updateRequirement('pythonCheck', pythonVersion ? 'check' : 'error', pythonVersion);
      } catch (e) {
        updateRequirement('pythonCheck', 'error', 'Not found');
      }

      // Check Ollama
      try {
        const ollamaStatus = await checkOllama();
        updateRequirement('ollamaCheck', ollamaStatus ? 'check' : 'warning', ollamaStatus);
      } catch (e) {
        updateRequirement('ollamaCheck', 'error', 'Not found');
      }

      // Check memory
      const memoryInfo = checkMemory();
      updateRequirement('memoryCheck', memoryInfo.sufficient ? 'check' : 'warning', memoryInfo.text);

      // OS check (simplified)
      updateRequirement('osCheck', 'check', navigator.platform);
    }

    function updateRequirement(elementId, status, text) {
      const element = document.getElementById(elementId);
      element.className = `requirement-icon ${status}`;
      element.textContent = status === 'check' ? '✓' : status === 'warning' ? '⚠️' : '✗';
    }

    async function checkPython() {
      try {
        const response = await fetch('http://127.0.0.1:8000/', { method: 'GET' });
        if (response.ok) return 'API accessible';
        return 'API not running';
      } catch {
        return 'Not detected';
      }
    }

    async function checkOllama() {
      try {
        const response = await fetch('http://127.0.0.1:11434/api/tags', { method: 'GET' });
        if (response.ok) return 'Running';
        return 'Installed but not running';
      } catch {
        return 'Not installed';
      }
    }

    function checkMemory() {
      if (navigator.deviceMemory) {
        const gb = navigator.deviceMemory;
        return {
          sufficient: gb >= 4,
          text: `${gb.toFixed(1)}GB available`
        };
      }
      return {
        sufficient: true,
        text: 'Memory info unavailable'
      };
    }

    async function installMax() {
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const statusMessage = document.getElementById('statusMessage');

      progressContainer.style.display = 'block';
      statusMessage.style.display = 'block';
      statusMessage.className = 'status-message';
      statusMessage.textContent = 'Starting installation...';

      try {
        // Step 1: Download backend
        updateProgress(20, 'Downloading MAX backend...');
        await downloadFile('https://github.com/lvs0/MAX/archive/main.zip', 'max-backend.zip');

        // Step 2: Install dependencies
        updateProgress(40, 'Installing Python dependencies...');
        await installDependencies();

        // Step 3: Setup database
        updateProgress(60, 'Setting up database...');
        await setupDatabase();

        // Step 4: Start services
        updateProgress(80, 'Starting MAX services...');
        await startServices();

        // Step 5: Final setup
        updateProgress(100, 'Installation complete!');
        statusMessage.className = 'status-message success';
        statusMessage.textContent = '✅ MAX has been successfully installed! Launching dashboard...';

        // Redirect to main app
        setTimeout(() => {
          window.open('index.html', '_blank');
        }, 2000);

      } catch (error) {
        statusMessage.className = 'status-message error';
        statusMessage.textContent = `❌ Installation failed: ${error.message}`;
        console.error('Installation error:', error);
      }
    }

    function updateProgress(percentage, message) {
      const progressFill = document.getElementById('progressFill');
      const statusMessage = document.getElementById('statusMessage');
      
      progressFill.style.width = `${percentage}%`;
      statusMessage.textContent = message;
    }

    async function downloadFile(url, filename) {
      // Simulate download (in real implementation, this would download and extract)
      return new Promise((resolve) => {
        setTimeout(() => {
          console.log(`Downloaded ${filename} from ${url}`);
          resolve();
        }, 1000);
      });
    }

    async function installDependencies() {
      // Simulate dependency installation
      return new Promise((resolve) => {
        setTimeout(() => {
          console.log('Dependencies installed: fastapi, uvicorn, ollama, sqlite3');
          resolve();
        }, 1500);
      });
    }

    async function setupDatabase() {
      // Simulate database setup
      return new Promise((resolve) => {
        setTimeout(() => {
          console.log('Database initialized');
          resolve();
        }, 1000);
      });
    }

    async function startServices() {
      // Simulate service startup
      return new Promise((resolve) => {
        setTimeout(() => {
          console.log('MAX services started');
          resolve();
        }, 1000);
      });
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => {
      checkRequirements();
    });
  </script>
</body>
</html>
