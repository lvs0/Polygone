<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max — Mobile AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>

<div class="mobile-app">
  <!-- Mobile Header -->
  <header class="mobile-header">
    <div class="mobile-logo">
      <div class="orb-icon"></div>
      <span>MAX</span>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMenu()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- Mobile Main Content -->
  <main class="mobile-main">
    <div class="mobile-orb" id="mobileOrb" onclick="toggleOrb()">
      <div class="orb-label" id="mobileOrbLabel">MAX · READY</div>
    </div>

    <!-- Mobile Chat Input -->
    <div class="mobile-chat-container">
      <input 
        type="text" 
        class="mobile-chat-input" 
        id="mobileChatInput" 
        placeholder="Ask Max anything..." 
        autocomplete="off"
        onkeypress="handleKeyPress(event)"
      >
      <button class="mobile-send-btn" onclick="sendChat()">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

    <!-- Mobile Quick Actions -->
    <div class="mobile-actions">
      <button class="mobile-action-btn" onclick="triggerAction('weather')" title="Weather">
        🌤️
      </button>
      <button class="mobile-action-btn" onclick="triggerAction('news')" title="News">
        📰
      </button>
      <button class="mobile-action-btn" onclick="triggerAction('timer')" title="Timer">
        ⏱️
      </button>
      <button class="mobile-action-btn" onclick="triggerAction('settings')" title="Settings">
        ⚙️
      </button>
    </div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav">
    <a href="#" class="mobile-nav-item active" onclick="setActiveNav(this, 'chat')">
      <span>💬</span>
      <span>Chat</span>
    </a>
    <a href="#" class="mobile-nav-item" onclick="setActiveNav(this, 'tasks')">
      <span>📋</span>
      <span>Tasks</span>
    </a>
    <a href="#" class="mobile-nav-item" onclick="setActiveNav(this, 'stats')">
      <span>📊</span>
      <span>Stats</span>
    </a>
    <a href="#" class="mobile-nav-item" onclick="setActiveNav(this, 'settings')">
      <span>⚙️</span>
      <span>Settings</span>
    </a>
  </nav>
</div>

<!-- Mobile Slide Menu -->
<div class="mobile-slide-menu" id="mobileSlideMenu">
  <div style="padding: 24px 16px;">
    <div class="sidebar-logo">
      <div class="orb-icon"></div>
      <span>MAX</span>
    </div>
    
    <div class="sidebar-section">
      <h3>Quick Actions</h3>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button class="mobile-action-btn" style="width: 100%; justify-content: flex-start;" onclick="triggerAction('voice')">
          🎤 Voice Mode
        </button>
        <button class="mobile-action-btn" style="width: 100%; justify-content: flex-start;" onclick="triggerAction('history')">
          📜 Chat History
        </button>
        <button class="mobile-action-btn" style="width: 100%; justify-content: flex-start;" onclick="triggerAction('export')">
          💾 Export Data
        </button>
      </div>
    </div>
    
    <div class="sidebar-section">
      <h3>Settings</h3>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <label style="display: flex; align-items: center; gap: 8px; color: var(--text);">
          <input type="checkbox" id="darkModeToggle" checked>
          <span>Dark Mode</span>
        </label>
        <label style="display: flex; align-items: center; gap: 8px; color: var(--text);">
          <input type="checkbox" id="notificationsToggle">
          <span>Notifications</span>
        </label>
        <label style="display: flex; align-items: center; gap: 8px; color: var(--text);">
          <span>Font Size</span>
          <select id="fontSizeSelect" style="background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); padding: 4px 8px; border-radius: 4px;">
            <option value="small">Small</option>
            <option value="medium" selected>Medium</option>
            <option value="large">Large</option>
          </select>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Menu Overlay -->
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="closeMenu()"></div>

<script>
const API_URL = 'http://127.0.0.1:8000';
let isSpeaking = false;
let currentView = 'chat';

// Mobile-specific functions
function toggleMenu() {
  const menu = document.getElementById('mobileSlideMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  menu.classList.toggle('active');
  overlay.classList.toggle('active');
}

function closeMenu() {
  const menu = document.getElementById('mobileSlideMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  menu.classList.remove('active');
  overlay.classList.remove('active');
}

function setActiveNav(element, view) {
  // Remove active class from all nav items
  document.querySelectorAll('.mobile-nav-item').forEach(item => {
    item.classList.remove('active');
  });
  
  // Add active class to clicked item
  element.classList.add('active');
  currentView = view;
  
  // Here you would switch between different views
  console.log('Switching to view:', view);
}

function handleKeyPress(event) {
  if (event.key === 'Enter') {
    sendChat();
  }
}

// Reuse existing functions from desktop
async function checkApi() {
  try {
    const res = await fetch(API_URL + '/', { method: 'GET' });
    return res.ok;
  } catch (e) {
    return false;
  }
}

async function sendChat() {
  const input = document.getElementById('mobileChatInput');
  const val = input.value.trim();
  if (!val) return;
  
  // Visual feedback
  const orb = document.getElementById('mobileOrb');
  const label = document.getElementById('mobileOrbLabel');
  orb.classList.add('speaking');
  label.textContent = 'MAX · THINKING';
  
  try {
    const res = await fetch(API_URL + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: val})
    });
    const data = await res.json();
    
    // Show response (simplified for mobile)
    alert(`MAX: ${data.response}`);
  } catch (e) {
    alert('Sorry, I could not connect to the API. Make sure the backend is running.');
  } finally {
    // Reset orb state
    orb.classList.remove('speaking');
    label.textContent = 'MAX · READY';
    input.value = '';
  }
}

function toggleOrb() {
  isSpeaking = !isSpeaking;
  const orb = document.getElementById('mobileOrb');
  const label = document.getElementById('mobileOrbLabel');

  if (isSpeaking) {
    orb.classList.add('speaking');
    label.textContent = 'MAX · SPEAKING';
  } else {
    orb.classList.remove('speaking');
    label.textContent = 'MAX · READY';
  }
}

function triggerAction(action) {
  // Simplified actions for mobile
  switch(action) {
    case 'weather':
      alert('Weather feature coming soon!');
      break;
    case 'news':
      alert('News feature coming soon!');
      break;
    case 'timer':
      alert('Timer feature coming soon!');
      break;
    case 'settings':
      toggleMenu();
      break;
    case 'voice':
      alert('Voice mode coming soon!');
      break;
    case 'history':
      alert('Chat history coming soon!');
      break;
    case 'export':
      alert('Export feature coming soon!');
      break;
  }
}

// Initialize mobile app
document.addEventListener('DOMContentLoaded', () => {
  // Check API status
  checkApi().then(online => {
    console.log('API Status:', online ? 'Online' : 'Offline');
  });
  
  // Setup accessibility
  setupAccessibility();
  
  // Setup swipe gestures
  setupSwipeGestures();
});

function setupAccessibility() {
  // Add ARIA labels
  document.getElementById('mobileChatInput').setAttribute('aria-label', 'Type your message to Max');
  document.getElementById('mobileOrb').setAttribute('role', 'button');
  document.getElementById('mobileOrb').setAttribute('aria-label', 'Toggle Max interaction mode');
  document.getElementById('mobileOrb').setAttribute('tabindex', '0');
  
  // Keyboard navigation
  document.getElementById('mobileOrb').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleOrb();
    }
  });
}

function setupSwipeGestures() {
  let touchStartX = 0;
  let touchEndX = 0;
  
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  });
  
  document.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  });
  
  function handleSwipe() {
    const swipeThreshold = 50;
    const diff = touchStartX - touchEndX;
    
    if (Math.abs(diff) > swipeThreshold) {
      if (diff > 0) {
        // Swipe left - could navigate to next view
        console.log('Swipe left detected');
      } else {
        // Swipe right - could open menu
        toggleMenu();
      }
    }
  }
}

// Settings handlers
document.getElementById('darkModeToggle')?.addEventListener('change', (e) => {
  if (e.target.checked) {
    document.documentElement.style.setProperty('--bg', '#050510');
    document.documentElement.style.setProperty('--text', '#e2e8f0');
  } else {
    document.documentElement.style.setProperty('--bg', '#ffffff');
    document.documentElement.style.setProperty('--text', '#000000');
  }
});

document.getElementById('fontSizeSelect')?.addEventListener('change', (e) => {
  const size = e.target.value;
  const root = document.documentElement;
  switch(size) {
    case 'small':
      root.style.fontSize = '14px';
      break;
    case 'medium':
      root.style.fontSize = '16px';
      break;
    case 'large':
      root.style.fontSize = '18px';
      break;
  }
});
</script>

</body>
</html>
